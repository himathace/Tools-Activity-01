<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome</title>  
</head>
<body>
  <div>
    <p>Welcome</p>
    <p>Enter your name to receive a greeting.</p>

    <form action="/greet" method="POST">
      <label>Your name</label>
      <input
        type="text"
        name="name"
        placeholder="Enter your name"
        required
        autocomplete="off"
      />
      <button
        type="submit"
      >
        Get greeting
      </button>
    </form>
  </div>
</body>
</html>
